name: Scrape Every 3 Days (Fair + Weak + Weak with Caveats)

on:
  schedule:
    - cron: '0 7 */3 * *'    # 07:00 UTC = 3 AM EDT every 3rd day of month
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper --tiers "Fair" "Weak" "Weak with Caveats"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: triday job update $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
