name: Scrape Daily (Strong + Moderate)

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 8 AM EDT daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper --tiers Strong Moderate

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: daily job update $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
